name: Mac

on:
  # Auto-runs disabled on this fork: this inherited upstream CI fails here (no
  # upstream secrets) and every push spammed the owner with "Run failed" mail.
  # Manual-only now; run tests locally. Re-add push: to restore.
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'true'
    - run: cd mac && ./build_release.sh
    - uses: actions/upload-artifact@v4
      with:
        name: amsynth-macos-${{ github.sha }}
        path: mac/amsynth-*.zip
