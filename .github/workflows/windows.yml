name: Windows

on:
  # Auto-runs disabled on this fork: this inherited upstream CI fails here (no
  # upstream secrets) and every push spammed the owner with "Run failed" mail.
  # Manual-only now; run tests locally. Re-add push: to restore.
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 2
        submodules: 'true'
    - uses: microsoft/setup-msbuild@v2
    - run: msbuild /p:Configuration="Release" /p:Platform="x64" win/amsynth.sln
    - run: iscc win/installer.iss
    - uses: actions/upload-artifact@v4
      with:
        name: amsynth-windows-installer-${{ github.sha }}
        path: win/amsynth_*.exe
