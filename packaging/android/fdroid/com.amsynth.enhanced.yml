Name: AMsynth enhanced
Summary: A classic two-oscillator analog-modelling synthesizer
Description: |
  AMsynth enhanced is an analog-modelling software synthesizer with the classic
  subtractive topology: two audio oscillators (sine, saw, square/pulse with
  adjustable width, and noise) feeding a resonant low-pass filter, with dedicated
  ADSR envelopes for amplitude and filter, an LFO, distortion and reverb.

  This is an independent, enhanced fork of amsynth. It shares the exact same
  portable C++ DSP engine as the desktop and plugin builds, so it sounds
  identical — only the audio output and user interface are native to Android.
  Audio runs through Oboe for low latency; the engine renders on a dedicated
  audio thread and is driven lock-free from the UI.

  Features:

  * The full amsynth synthesis engine, presented with amsynth's own desktop
    skin — the same panel background and film-strip knob/button graphics at the
    same layout as the desktop synth.
  * All the factory preset banks (Factory, Brian's, Patrik's), with a bank and
    preset browser.
  * A sweepable multi-touch keyboard with octave shift.
  * Save and load your own sounds via the system file picker.
  * Low-latency audio via Oboe (AAudio where available).

