# Subsequent releases do NOT need to re-copy — publish-live.sh rewrites
# CurrentVersion / CurrentVersionCode automatically from the APK manifest.
#
# Publish flow (APK comes from packaging/android/build-on-moviecomp.sh):
#   /mnt/subtitled/fdroid/publish-live.sh --dry-run \
#       ~/amsynth/android/app/build/outputs/apk/release/app-release-unsigned.apk \
#       com.amsynth.enhanced
#   /mnt/subtitled/fdroid/publish-live.sh \
#       ~/amsynth/android/app/build/outputs/apk/release/app-release-unsigned.apk \
#       com.amsynth.enhanced
#
# Signing is handled centrally by the F-Droid repo's keystore at publish time;
# the app does NOT ship its own keystore.

